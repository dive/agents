[tasks.list]
description = "Show configured AGENTS.md link targets"
run = "python3 setup.py list"

[tasks.link]
description = "Create AGENTS.md links (safe mode)"
run = "python3 setup.py link"

[tasks.link-replace]
description = "Create AGENTS.md links and replace stale symlinks"
run = "python3 setup.py link --replace-symlinks"

[tasks.health]
description = "Check AGENTS.md link health"
run = "python3 setup.py health"

[tasks.skills-list]
description = "List repo Agent Skills"
run = "python3 setup.py skills list"

[tasks.skills-health]
description = "Check Agent Skills health"
run = "python3 setup.py skills health"

[tasks.skills-link]
description = "Link repo Agent Skills into ~/.agents/skills"
run = "python3 setup.py skills link"

[tasks.skills-link-replace]
description = "Link repo Agent Skills and replace stale symlinks"
run = "python3 setup.py skills link --replace-symlinks"

[tasks.skills-updates-check]
description = "Preview npx skills project updates without changing this repo"
run = """
set -euo pipefail
tmp="$(mktemp -d)"
cleanup() { rm -rf "$tmp"; }
trap cleanup EXIT
mkdir -p "$tmp/repo"
rsync -a --delete \
  --exclude .git \
  --exclude .rumdl_cache \
  --exclude node_modules \
  --exclude pi-extensions/node_modules \
  ./ "$tmp/repo/"
(
  cd "$tmp/repo"
  npx --yes skills update -p -y
)
status=0
diff -ruN skills "$tmp/repo/skills" || status=$?
left_lock="skills-lock.json"
right_lock="$tmp/repo/skills-lock.json"
if [ ! -e "$left_lock" ]; then left_lock="/dev/null"; fi
if [ ! -e "$right_lock" ]; then right_lock="/dev/null"; fi
diff -u "$left_lock" "$right_lock" || status=$?
if [ "$status" -eq 0 ]; then
  echo "No file changes from automatic skill update."
else
  echo "Run 'mise run skills-update' to apply these changes."
fi
exit "$status"
"""

[tasks.skills-update]
description = "Update imported Agent Skills in ./skills from skills-lock.json"
run = """
npx --yes skills update -p -y
python3 setup.py skills health --strict
"""

[tasks.prompts-list]
description = "List repo pi prompt templates"
run = "python3 setup.py prompts list"

[tasks.prompts-health]
description = "Check pi prompt template health"
run = "python3 setup.py prompts health"

[tasks.prompts-link]
description = "Link repo pi prompt templates into ~/.pi/agent/prompts"
run = "python3 setup.py prompts link"

[tasks.prompts-link-replace]
description = "Link repo pi prompt templates and replace stale symlinks"
run = "python3 setup.py prompts link --replace-symlinks"

[tasks.pi-extensions-health]
description = "Check pi-extensions install health (global + local)"
run = "python3 setup.py extensions health --scope both"

[tasks.pi-extensions-install]
description = "Install all pi-extensions in global pi settings"
run = "python3 setup.py extensions install --scope global"

[tasks.pi-extensions-install-local]
description = "Install all pi-extensions in project .pi/settings.json"
run = "python3 setup.py extensions install --scope local"

[tasks.pi-extensions-uninstall]
description = "Uninstall all pi-extensions from global pi settings"
run = "python3 setup.py extensions uninstall --scope global"

[tasks.pi-extensions-uninstall-local]
description = "Uninstall all pi-extensions from project .pi/settings.json"
run = "python3 setup.py extensions uninstall --scope local"
