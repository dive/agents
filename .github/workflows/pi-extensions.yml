name: pi-extensions

on:
  push:
    branches:
      - main
    paths:
      - "pi-extensions/**"
      - ".github/workflows/pi-extensions.yml"
  pull_request:
    branches:
      - main
    paths:
      - "pi-extensions/**"
      - ".github/workflows/pi-extensions.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pi-extensions

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pi-extensions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
